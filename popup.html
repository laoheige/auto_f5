<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>防过期自动点击</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      width: 280px;
      padding: 16px;
      font-family: 'Microsoft YaHei', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }
    
    .header {
      text-align: center;
      margin-bottom: 16px;
    }
    
    .header h1 {
      font-size: 18px;
      margin-bottom: 4px;
    }
    
    .header p {
      font-size: 12px;
      opacity: 0.8;
    }
    
    .status {
      background: rgba(255,255,255,0.2);
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 16px;
      text-align: center;
    }
    
    .status-indicator {
      display: inline-block;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      margin-right: 8px;
      vertical-align: middle;
    }
    
    .status-indicator.active {
      background: #4ade80;
      box-shadow: 0 0 10px #4ade80;
    }
    
    .status-indicator.inactive {
      background: #ef4444;
    }
    
    .control-group {
      background: rgba(255,255,255,0.2);
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 12px;
    }
    
    .control-group label {
      display: block;
      font-size: 13px;
      margin-bottom: 8px;
    }
    
    .interval-control {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .interval-control input {
      flex: 1;
      padding: 8px;
      border: none;
      border-radius: 4px;
      font-size: 14px;
      text-align: center;
    }
    
    .interval-control span {
      font-size: 13px;
    }
    
    .toggle-btn {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.3s;
    }
    
    .toggle-btn.start {
      background: #22c55e;
    }
    
    .toggle-btn.start:hover {
      background: #16a34a;
    }
    
    .toggle-btn.stop {
      background: #ef4444;
    }
    
    .toggle-btn.stop:hover {
      background: #dc2626;
    }
    
    .footer {
      text-align: center;
      font-size: 11px;
      opacity: 0.7;
      margin-top: 12px;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>防过期自动点击</h1>
    <p>防止网页因长时间无操作而过期</p>
  </div>
  
  <div class="status">
    <span id="statusIndicator" class="status-indicator inactive"></span>
    <span id="statusText">已停止</span>
  </div>
  
  <div class="control-group">
    <label>点击间隔（秒）</label>
    <div class="interval-control">
      <input type="number" id="intervalInput" min="1" max="300" value="10">
      <span>秒</span>
    </div>
  </div>
  
  <div class="control-group">
    <label>点击范围</label>
    <div class="interval-control">
      <select id="tabMode" style="flex:1; padding:8px; border:none; border-radius:4px; font-size:14px;">
        <option value="current">当前标签页</option>
        <option value="all">所有标签页</option>
      </select>
    </div>
  </div>
  
  <button id="toggleBtn" class="toggle-btn start">启动</button>
  
  <div class="control-group" style="margin-top: 12px;">
    <label>运行统计</label>
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
      <span id="clickCountDisplay">已点击 0 次</span>
      <span id="runTimeDisplay">运行 0秒</span>
    </div>
    <div style="text-align: right;">
      <button id="resetBtn" style="padding: 4px 8px; border: none; border-radius: 4px; background: rgba(255,255,255,0.3); color: white; cursor: pointer; font-size: 12px;">重置</button>
    </div>
  </div>
  
  <div class="footer">
    点击页面空白处，模拟用户操作
  </div>
  
  <script src="popup.js"></script>
</body>
</html>
